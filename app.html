<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>aiwillmake — AI Writing App</title>
  <meta name="description" content="Generate AI-powered content for every category with custom forms." />
  <style>
    :root{--bg1:#040714;--bg2:#101b34;--muted:#b0bdd8;--text:#eef4ff;--border:rgba(255,255,255,0.12);--accent:#6e81ff;--accent2:#a360ff;--success:#10b981}
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;color:var(--text);background:linear-gradient(180deg,var(--bg1),var(--bg2));-webkit-font-smoothing:antialiased;min-height:100%}
    body{background-image:radial-gradient(circle at top left,rgba(110,129,255,0.16) 0%,transparent 28%),radial-gradient(circle at bottom right,rgba(163,96,255,0.1) 0%,transparent 30%)}
    .page{max-width:1200px;margin:0 auto;padding:32px 24px;display:grid;gap:28px}
    .header{display:flex;justify-content:space-between;align-items:center;gap:18px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.1)}
    .brand{font-size:1.15rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
    .nav{display:flex;gap:14px}
    .nav a{color:#c4cfea;text-decoration:none;font-size:.95rem;transition:color .2s}
    .nav a:hover{color:#fff}
    /* category cards */
    .category-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
    .cat-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.14);border-radius:24px;padding:24px;cursor:pointer;transition:transform .2s,background .2s,border-color .2s;display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center}
    .cat-card:hover{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.22);transform:translateY(-1px)}
    .cat-card.active{background:linear-gradient(180deg,rgba(110,129,255,0.22),rgba(163,96,255,0.15));border-color:rgba(110,129,255,0.45);transform:translateY(-2px)}
    .cat-icon{width:64px;height:64px;border-radius:18px;display:grid;place-items:center;font-size:1.7rem;background:rgba(255,255,255,0.1)}
    .cat-title{font-size:1rem;font-weight:700;margin:0;color:#eef4ff}
    /* subcategory cards */
    .section-label{color:#c4cfea;font-size:.82rem;letter-spacing:.08em;text-transform:uppercase;margin:0 0 6px}
    .section-title{font-size:1.2rem;font-weight:700;margin:0 0 16px;color:#eef4ff}
    .subcat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
    .subcat-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.14);border-radius:18px;padding:18px 16px;cursor:pointer;transition:transform .2s,background .2s,border-color .2s;text-align:left}
    .subcat-card:hover{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.22);transform:translateY(-1px)}
    .subcat-card.active{background:linear-gradient(180deg,rgba(110,129,255,0.2),rgba(163,96,255,0.13));border-color:rgba(110,129,255,0.45)}
    .subcat-title{font-size:.92rem;font-weight:700;margin:0 0 5px;color:#eef4ff}
    .subcat-desc{color:#b8c6e0;font-size:.82rem;margin:0;line-height:1.45}
    /* form */
    .form-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:28px;padding:28px}
    .form-inner{display:grid;gap:18px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .optional-divider{color:#c4cfea;font-size:.85rem;font-weight:600;padding-top:8px;border-top:1px solid rgba(255,255,255,0.14);margin-top:2px}
    label{display:block;color:#c8d4ec;font-size:.94rem;margin-bottom:8px;font-weight:500}
    select,input,textarea{width:100%;padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#eef4ff;font:inherit;outline:none;transition:border-color .2s}
    select:focus,input:focus,textarea:focus{border-color:var(--accent);background:rgba(255,255,255,0.08)}
    input::placeholder,textarea::placeholder{color:rgba(180,195,225,0.5)}
    textarea{resize:vertical;min-height:120px}
    .hidden{display:none}
    .btn-generate{width:100%;padding:16px 18px;border:none;border-radius:16px;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 18px 50px rgba(110,129,255,0.22);transition:transform .2s,opacity .2s}
    .btn-generate:hover:not(:disabled){transform:translateY(-2px)}
    .btn-generate:disabled{opacity:.5;cursor:not-allowed}
    /* results */
    .results{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);border-radius:26px;padding:24px;display:grid;gap:18px}
    .results h2{margin:0;font-size:1.2rem;color:#eef4ff}
    .cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
    .caption-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:18px;padding:18px;display:grid;gap:12px}
    .caption-meta{display:flex;justify-content:space-between;align-items:center}
    .caption-num{color:var(--accent);font-weight:800}
    .copy-btn{border:none;border-radius:12px;padding:10px 14px;background:var(--accent);color:#fff;cursor:pointer;font-weight:700;transition:opacity .2s;flex-shrink:0}
    .copy-btn:hover{opacity:.85}
    .note{color:#b8c6e0;font-size:.95rem;margin:0}
    @media(max-width:960px){.category-grid{grid-template-columns:repeat(2,1fr)}.form-row{grid-template-columns:1fr}.cards-grid{grid-template-columns:1fr}}
    @media(max-width:680px){.category-grid{grid-template-columns:1fr}.page{padding:20px 16px}}
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="brand">aiwillmake</div>
      <nav class="nav"><a href="index.html">Home</a><a href="app.html">App</a></nav>
    </header>

    <section>
      <h1 style="margin:0 0 8px;font-size:2.4rem;line-height:1.05">Choose a category, fill the form, and generate instantly.</h1>
      <p class="note">Messaging, social media, and legal drafts — powered by AI.</p>
    </section>

    <section class="category-grid" id="categoryGrid">
      <p style="color:var(--muted);font-size:.9rem">Loading...</p>
    </section>

    <section id="subcatSection" class="hidden">
      <p class="section-label">Subcategory</p>
      <h3 class="section-title" id="catTitle"></h3>
      <div class="subcat-grid" id="subcatGrid"></div>
    </section>

    <section class="form-card hidden" id="formCard">
      <form id="mainForm" novalidate>
        <div class="form-inner">
          <div class="form-row" id="commonFields"></div>
          <div id="dynamicFields" style="display:grid;gap:18px"></div>
          <button type="button" class="btn-generate" id="generateBtn">Generate</button>
        </div>
      </form>
    </section>

    <section class="results hidden" id="resultsSection">
      <h2>Generated texts</h2>
      <p class="note">Click copy to save each text.</p>
      <div class="cards-grid" id="captionsContainer"></div>
    </section>
  </div>

  <script>
    let appData = null;
    let selectedCatId = null;
    let selectedSubId = null;

    async function init() {
      try {
        const res = await fetch('/api/categories');
        appData = await res.json();
        renderCommonFields();
        renderCategories();
      } catch (e) {
        document.getElementById('categoryGrid').innerHTML = '<p style="color:#f87171">Failed to load categories. Please refresh.</p>';
      }
    }

    function renderCommonFields() {
      document.getElementById('commonFields').innerHTML = appData.common_fields.map(f => {
        const opts = f.options.map(o => `<option value="${o}">${o}</option>`).join('');
        return `<div><label for="cf-${f.key}">${f.label} <span style="color:var(--accent2)">*</span></label><select id="cf-${f.key}">${opts}</select></div>`;
      }).join('');
    }

    function renderCategories() {
      const grid = document.getElementById('categoryGrid');
      grid.innerHTML = appData.categories.map(cat =>
        `<button type="button" class="cat-card" data-id="${cat.id}">
          <div class="cat-icon">${cat.icon}</div>
          <p class="cat-title">${cat.name}</p>
        </button>`
      ).join('');
      grid.querySelectorAll('.cat-card').forEach(card =>
        card.addEventListener('click', () => selectCategory(card.dataset.id))
      );
    }

    function selectCategory(id) {
      selectedCatId = id;
      selectedSubId = null;
      document.querySelectorAll('.cat-card').forEach(c => c.classList.toggle('active', c.dataset.id === id));

      const cat = appData.categories.find(c => c.id === id);
      document.getElementById('catTitle').textContent = cat.name;
      const grid = document.getElementById('subcatGrid');
      grid.innerHTML = cat.subcategories.map(sub =>
        `<button type="button" class="subcat-card" data-id="${sub.id}">
          <p class="subcat-title">${sub.name}</p>
          <p class="subcat-desc">${sub.description}</p>
        </button>`
      ).join('');
      grid.querySelectorAll('.subcat-card').forEach(card =>
        card.addEventListener('click', () => selectSubcategory(card.dataset.id))
      );

      document.getElementById('subcatSection').classList.remove('hidden');
      document.getElementById('formCard').classList.add('hidden');
      document.getElementById('resultsSection').classList.add('hidden');
      document.getElementById('subcatSection').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function selectSubcategory(id) {
      selectedSubId = id;
      document.querySelectorAll('.subcat-card').forEach(c => c.classList.toggle('active', c.dataset.id === id));

      const cat = appData.categories.find(c => c.id === selectedCatId);
      const sub = cat.subcategories.find(s => s.id === id);
      renderDynamicFields(sub);

      document.getElementById('formCard').classList.remove('hidden');
      document.getElementById('resultsSection').classList.add('hidden');
      document.getElementById('formCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function fieldHTML(f, required) {
      const star = required ? ` <span style="color:var(--accent2)">*</span>` : '';
      const label = `<label for="df-${f.key}">${f.label}${star}</label>`;
      if (f.type === 'select') {
        const opts = f.options.map(o => `<option value="${o}">${o}</option>`).join('');
        return `${label}<select id="df-${f.key}">${opts}</select>`;
      }
      if (f.type === 'textarea') {
        return `${label}<textarea id="df-${f.key}" placeholder="${f.placeholder || ''}"></textarea>`;
      }
      return `${label}<input id="df-${f.key}" type="text" placeholder="${f.placeholder || ''}" />`;
    }

    function groupFields(fields, required) {
      let html = '';
      let i = 0;
      while (i < fields.length) {
        const f = fields[i];
        if (f.type === 'textarea') {
          html += `<div>${fieldHTML(f, required)}</div>`;
          i++;
        } else {
          const next = fields[i + 1];
          if (next && next.type !== 'textarea') {
            html += `<div class="form-row"><div>${fieldHTML(f, required)}</div><div>${fieldHTML(next, required)}</div></div>`;
            i += 2;
          } else {
            html += `<div>${fieldHTML(f, required)}</div>`;
            i++;
          }
        }
      }
      return html;
    }

    function renderDynamicFields(sub) {
      let html = groupFields(sub.required_fields, true);
      if (sub.optional_fields.length > 0) {
        html += `<div class="optional-divider">Optional fields</div>`;
        html += groupFields(sub.optional_fields, false);
      }
      document.getElementById('dynamicFields').innerHTML = html;
    }

    function val(id) {
      return document.getElementById(id)?.value?.trim() || '';
    }

    async function generate() {
      if (!selectedCatId || !selectedSubId) {
        alert('Please select a category and subcategory.');
        return;
      }
      const cat = appData.categories.find(c => c.id === selectedCatId);
      const sub = cat.subcategories.find(s => s.id === selectedSubId);
      const fields = {};

      for (const f of appData.common_fields) {
        const v = val(`cf-${f.key}`);
        if (!v) { alert(`${f.label} is required.`); return; }
        fields[f.key] = v;
      }
      for (const f of sub.required_fields) {
        const v = val(`df-${f.key}`);
        if (!v) { alert(`${f.label} is required.`); return; }
        fields[f.key] = v;
      }
      for (const f of sub.optional_fields) {
        const v = val(`df-${f.key}`);
        if (v) fields[f.key] = v;
      }

      const btn = document.getElementById('generateBtn');
      btn.disabled = true;
      btn.textContent = 'Generating...';

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ categoryId: selectedCatId, subcategoryId: selectedSubId, fields })
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'Generation failed');
        }
        const data = await res.json();
        const captions = data.captions || [];
        const container = document.getElementById('captionsContainer');
        container.innerHTML = '';
        captions.forEach((text, i) => {
          const card = document.createElement('div');
          card.className = 'caption-card';
          card.innerHTML = `
            <div class="caption-meta">
              <span class="caption-num">${i + 1}</span>
              <button type="button" class="copy-btn">Copy</button>
            </div>
            <p style="margin:0;line-height:1.65">${text}</p>`;
          card.querySelector('.copy-btn').addEventListener('click', async (e) => {
            await navigator.clipboard.writeText(text);
            e.target.textContent = 'Copied';
            e.target.style.background = 'var(--success)';
            setTimeout(() => { e.target.textContent = 'Copy'; e.target.style.background = ''; }, 1800);
          });
          container.appendChild(card);
        });
        document.getElementById('resultsSection').classList.remove('hidden');
        document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
      } catch (err) {
        alert(`Error: ${err.message}`);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate';
      }
    }

    document.getElementById('generateBtn').addEventListener('click', generate);
    document.getElementById('mainForm').addEventListener('submit', e => e.preventDefault());

    init();
  </script>
</body>
</html>
